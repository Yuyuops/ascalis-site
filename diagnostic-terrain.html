<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic Terrain — ASCALIS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--night:#0F1A2E;--teal:#1B3A4B;--copper:#B07642;--copper-light:#D4956A;--cream:#FAF9F6;--white:#fff;--text:#2C3E50;--tl:#5A6B7A;--tm:#8A95A0;--green:#0F6E56;--amber:#854F0B;--red:#A32D2D;--blue:#185FA5;--purple:#534AB7;--border:rgba(0,0,0,.06);--f:'DM Sans',sans-serif;--d:'Instrument Serif',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--cream);color:var(--text)}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header svg{height:22px}
.header-actions{display:flex;gap:8px}
.hbtn{padding:7px 16px;border-radius:6px;font-family:var(--f);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--tl);transition:all .2s}
.hbtn:hover{border-color:var(--copper);color:var(--copper)}
.hbtn.primary{background:var(--night);color:var(--cream);border-color:var(--night)}
.hbtn.primary:hover{background:var(--teal)}
.hero{background:var(--night);padding:32px 28px;color:var(--cream)}
.hero h1{font-family:var(--d);font-size:28px;font-weight:400;margin-bottom:6px}
.hero p{font-size:14px;color:rgba(232,230,223,.5)}
.meta-bar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;gap:16px;flex-wrap:wrap}
.meta-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:180px}
.meta-field label{font-size:11px;font-weight:500;color:var(--tm);text-transform:uppercase;letter-spacing:.5px}
.meta-field input,.meta-field select{padding:7px 10px;border:1px solid var(--border);border-radius:5px;font-family:var(--f);font-size:13px;outline:none;background:var(--cream)}
.meta-field input:focus,.meta-field select:focus{border-color:var(--copper)}
.container{max-width:1200px;margin:0 auto;padding:28px 24px}
.layout{display:grid;grid-template-columns:1fr 380px;gap:28px;align-items:start}
.domains-col{display:flex;flex-direction:column;gap:16px}
.domain{background:var(--white);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.domain-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.domain-header:hover{background:rgba(0,0,0,.01)}
.domain-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.domain-title .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.domain-score{font-size:13px;font-weight:600;padding:3px 12px;border-radius:12px}
.ds-green{background:#E1F5EE;color:var(--green)}.ds-amber{background:#FAEEDA;color:var(--amber)}.ds-red{background:#FCEBEB;color:var(--red)}.ds-gray{background:var(--cream);color:var(--tm)}
.domain-toggle{font-size:16px;color:var(--tm);transition:transform .2s}
.domain.open .domain-toggle{transform:rotate(180deg)}
.domain-body{display:none;padding:0 20px 16px;border-top:1px solid var(--border)}
.domain.open .domain-body{display:block}
.criterion{display:grid;grid-template-columns:1fr 200px 140px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.03)}
.criterion:last-child{border:none}
.crit-label{font-size:13px;color:var(--tl);line-height:1.4}
.crit-slider{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;background:var(--cream)}
.crit-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--copper);cursor:pointer;border:2px solid var(--white);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.crit-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--copper);cursor:pointer;border:2px solid var(--white)}
.crit-val{font-size:12px;font-weight:600;text-align:center;padding:3px 0;border-radius:4px;min-width:50px}
.cv-1{color:var(--red);background:#FCEBEB}.cv-2{color:#993C1D;background:#FAECE7}.cv-3{color:var(--amber);background:#FAEEDA}.cv-4{color:var(--blue);background:#E6F1FB}.cv-5{color:var(--green);background:#E1F5EE}
.crit-obs{grid-column:1/-1;margin-top:-4px}
.crit-obs textarea{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-family:var(--f);font-size:12px;color:var(--tl);resize:vertical;min-height:32px;outline:none;background:var(--cream)}
.crit-obs textarea:focus{border-color:var(--copper)}
.crit-obs textarea::placeholder{color:var(--tm)}
.toggle-obs{font-size:11px;color:var(--copper);cursor:pointer;text-decoration:none;margin-left:auto;white-space:nowrap}

/* RIGHT PANEL */
.panel{position:sticky;top:70px;display:flex;flex-direction:column;gap:16px}
.panel-card{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:20px}
.panel-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--copper);margin-bottom:14px}
.global-score{text-align:center;padding:20px;background:linear-gradient(135deg,var(--night),var(--teal));border-radius:10px;color:var(--cream);margin-bottom:16px}
.gs-val{font-family:var(--d);font-size:48px;color:var(--copper-light);line-height:1}
.gs-label{font-size:11px;color:rgba(232,230,223,.5);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.gs-level{font-size:13px;margin-top:8px;padding:4px 14px;border-radius:12px;display:inline-block}
.gl-green{background:rgba(15,110,86,.2);color:#5DCAA5}.gl-amber{background:rgba(133,79,11,.2);color:var(--copper-light)}.gl-red{background:rgba(163,45,45,.2);color:#F09595}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tl);margin-bottom:5px}
.legend-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-item .lscore{margin-left:auto;font-weight:600;color:var(--text);min-width:35px;text-align:right}
.synth-section{margin-top:12px}
.synth-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.synth-item{font-size:12px;color:var(--tl);padding:4px 0 4px 14px;position:relative;line-height:1.4}
.synth-item::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%}
.synth-item.strong::before{background:var(--green)}
.synth-item.weak::before{background:var(--red)}
.csv-zone{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s}
.csv-zone:hover{border-color:var(--copper)}
.csv-zone p{font-size:12px;color:var(--tm)}
.csv-zone input{display:none}

@media print{
  .header,.meta-bar,.csv-zone,.hbtn,.toggle-obs{display:none!important}
  .hero{padding:16px 0;background:none;color:var(--text)}
  .hero h1{color:var(--night);font-size:22px}
  .domain{break-inside:avoid}
  .domain.open .domain-body{display:block!important}
  .panel{position:static}
  .layout{grid-template-columns:1fr 300px}
  body{background:white}
}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .panel{position:static}
  .criterion{grid-template-columns:1fr 120px 60px}
  .meta-bar{flex-direction:column}
}
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 240 40" fill="none"><path d="M4 36 L14 6 L24 36" stroke="#B07642" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="34" y="32" font-family="'DM Sans',sans-serif" font-size="24" font-weight="500" fill="#0F1A2E" letter-spacing="4.5">SCALIS</text></svg>
  <div class="header-actions">
    <button class="hbtn" onclick="exportCSV()">↓ Export CSV</button>
    <button class="hbtn" onclick="window.print()">🖨 Imprimer</button>
    <button class="hbtn primary" onclick="expandAll()">Tout ouvrir</button>
  </div>
</div>

<div class="hero">
  <h1>Trame de Diagnostic Terrain</h1>
  <p>Grille d'observation structurée — 8 domaines, 40 critères — scoring et radar temps réel</p>
</div>

<div class="meta-bar">
  <div class="meta-field"><label>Entreprise</label><input type="text" id="m-company" placeholder="Nom de l'entreprise"></div>
  <div class="meta-field"><label>Site / Atelier</label><input type="text" id="m-site" placeholder="Site audité"></div>
  <div class="meta-field"><label>Consultant</label><input type="text" id="m-consultant" placeholder="Votre nom"></div>
  <div class="meta-field"><label>Date</label><input type="date" id="m-date"></div>
  <div class="meta-field"><label>Secteur</label><select id="m-sector"><option>Aéronautique</option><option>BTP / Construction</option><option>Transport & Logistique</option><option>Autre</option></select></div>
</div>

<div class="container">
<div class="layout">
  <div class="domains-col" id="domains-col"></div>
  <div class="panel">
    <div class="global-score">
      <div class="gs-val" id="gs-val">2.5</div>
      <div class="gs-label">Score global / 5</div>
      <div class="gs-level" id="gs-level">En progression</div>
    </div>
    <div class="panel-card">
      <div class="panel-title">Radar de maturité</div>
      <svg id="radar" viewBox="0 0 320 300" width="100%"></svg>
      <div id="legend"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">Synthèse automatique</div>
      <div id="synthesis"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">Importer des données</div>
      <div class="csv-zone" onclick="document.getElementById('csv-input').click()">
        <p>Cliquez ou glissez un fichier CSV</p>
        <p style="font-size:11px;color:var(--tm);margin-top:4px">Format : domaine;critère;score (1-5)</p>
        <input type="file" id="csv-input" accept=".csv" onchange="importCSV(event)">
      </div>
    </div>
  </div>
</div>
</div>

<script>
const DOMAINS=[
{name:'Production & flux',color:'#185FA5',criteria:[
'Les flux de production sont identifiés et documentés',
'Les temps de cycle sont mesurés et affichés',
'Les en-cours sont maîtrisés et dimensionnés',
'Les goulots d\'étranglement sont identifiés et gérés',
'Le TRS/TRG est mesuré sur les équipements critiques'
]},
{name:'Qualité & conformité',color:'#0F6E56',criteria:[
'Le système de gestion des NC est structuré et utilisé',
'Les causes racines sont analysées systématiquement (5P, Ishikawa)',
'Les actions correctives sont suivies avec vérification d\'efficacité',
'Les contrôles en cours de production sont formalisés',
'La traçabilité produit est assurée de bout en bout'
]},
{name:'Documentation & standards',color:'#D4956A',criteria:[
'Les gammes opératoires sont à jour et accessibles au poste',
'Les procédures reflètent les pratiques réelles',
'Le circuit de validation documentaire est défini et respecté',
'Les versions sont gérées, les documents périmés retirés',
'Les opérateurs participent à la mise à jour des documents'
]},
{name:'Organisation & management',color:'#534AB7',criteria:[
'Les rôles et responsabilités qualité sont clairement définis',
'Des rituels de pilotage qualité existent (réunions, revues)',
'Les objectifs qualité sont déclinés et suivis par indicateurs',
'La direction s\'implique visiblement dans la démarche qualité',
'La communication inter-services est fluide et structurée'
]},
{name:'Équipements & maintenance',color:'#993C1D',criteria:[
'Un plan de maintenance préventive existe et est respecté',
'Les pannes sont enregistrées et analysées',
'Les équipements de mesure sont étalonnés et suivis',
'Les opérateurs assurent la maintenance de 1er niveau',
'L\'environnement de travail est propre et rangé (5S)'
]},
{name:'Fournisseurs & sous-traitance',color:'#854F0B',criteria:[
'Les fournisseurs critiques sont évalués régulièrement',
'Les cahiers des charges sont formalisés et à jour',
'Le contrôle réception est structuré avec critères définis',
'Les NC fournisseurs sont tracées et communiquées',
'Un plan B existe pour les fournisseurs critiques'
]},
{name:'Compétences & formation',color:'#0F6E56',criteria:[
'Une matrice de compétences/polyvalence existe et est à jour',
'Les formations sont planifiées et tracées',
'Les nouveaux arrivants bénéficient d\'un parcours d\'intégration',
'Les habilitations et qualifications sont suivies',
'Le savoir-faire critique est identifié et sécurisé'
]},
{name:'Maturité numérique',color:'#185FA5',criteria:[
'Les indicateurs qualité sont disponibles en temps réel',
'Les flux de validation sont digitalisés (pas papier/mail)',
'Les données sont exploitées pour détecter les tendances',
'Un espace collaboratif qualité est en place (SharePoint, etc.)',
'Les relances et alertes sont automatisées'
]}
];

const LABELS=['Inexistant','Émergent','Défini','Maîtrisé','Optimisé'];
let scores=DOMAINS.map(d=>d.criteria.map(()=>3));
let observations=DOMAINS.map(d=>d.criteria.map(()=>''));
let obsVisible=DOMAINS.map(d=>d.criteria.map(()=>false));

function setScore(di,ci,val){scores[di][ci]=+val;render()}
function toggleObs(di,ci){obsVisible[di][ci]=!obsVisible[di][ci];renderDomains()}
function setObs(di,ci,val){observations[di][ci]=val}
function domainAvg(di){const s=scores[di];return s.reduce((a,b)=>a+b,0)/s.length}
function globalAvg(){return DOMAINS.map((_,i)=>domainAvg(i)).reduce((a,b)=>a+b,0)/DOMAINS.length}

function scoreClass(v){if(v>=4)return'ds-green';if(v>=3)return'ds-amber';if(v>=2)return'ds-red';return'ds-gray'}
function valClass(v){return'cv-'+v}

function renderDomains(){
  const col=document.getElementById('domains-col');
  col.innerHTML=DOMAINS.map((d,di)=>{
    const avg=domainAvg(di);
    const sc=scoreClass(avg);
    const isOpen=document.querySelector(`.domain[data-d="${di}"]`)?.classList.contains('open');
    return `<div class="domain${isOpen?' open':''}" data-d="${di}">
      <div class="domain-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="domain-title"><span class="dot" style="background:${d.color}"></span>${d.name}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="domain-score ${sc}">${avg.toFixed(1)} / 5</span>
          <span class="domain-toggle">▾</span>
        </div>
      </div>
      <div class="domain-body">
        ${d.criteria.map((c,ci)=>{
          const v=scores[di][ci];
          return `<div class="criterion">
            <div style="display:flex;align-items:center;gap:8px"><span class="crit-label">${c}</span><a class="toggle-obs" onclick="toggleObs(${di},${ci})">${obsVisible[di][ci]?'Masquer':'+ Obs.'}</a></div>
            <input type="range" class="crit-slider" min="1" max="5" value="${v}" oninput="setScore(${di},${ci},this.value)">
            <span class="crit-val ${valClass(v)}">${v} — ${LABELS[v-1]}</span>
            ${obsVisible[di][ci]?`<div class="crit-obs"><textarea placeholder="Observation terrain..." oninput="setObs(${di},${ci},this.value)">${observations[di][ci]}</textarea></div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderRadar(){
  const svg=document.getElementById('radar');
  const cx=160,cy=140,maxR=105,levels=5,n=DOMAINS.length;
  const step=2*Math.PI/n,start=-Math.PI/2;
  let h='';
  for(let l=1;l<=levels;l++){const r=l/levels*maxR;let pts=[];for(let i=0;i<n;i++){const a=start+i*step;pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`)}h+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#D3D1C7" stroke-width="0.5" opacity="0.3"/>`}
  for(let i=0;i<n;i++){const a=start+i*step;h+=`<line x1="${cx}" y1="${cy}" x2="${cx+maxR*Math.cos(a)}" y2="${cy+maxR*Math.sin(a)}" stroke="#D3D1C7" stroke-width="0.5" opacity="0.2"/>`}
  const avgs=DOMAINS.map((_,i)=>domainAvg(i));
  let dp=[];avgs.forEach((v,i)=>{const a=start+i*step,r=v/5*maxR;dp.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`)});
  h+=`<polygon points="${dp.join(' ')}" fill="rgba(176,118,66,0.12)" stroke="#B07642" stroke-width="1.8"/>`;
  avgs.forEach((v,i)=>{const a=start+i*step,r=v/5*maxR;h+=`<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="3.5" fill="${DOMAINS[i].color}"/>`});
  avgs.forEach((_,i)=>{const a=start+i*step,lr=maxR+22,x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a),anc=Math.abs(Math.cos(a))<.1?'middle':Math.cos(a)>0?'start':'end';h+=`<text x="${x}" y="${y+4}" text-anchor="${anc}" font-family="'DM Sans',sans-serif" font-size="10" fill="#5A6B7A">${DOMAINS[i].name}</text>`});
  svg.innerHTML=h;
  document.getElementById('legend').innerHTML=DOMAINS.map((d,i)=>`<div class="legend-item"><span class="dot" style="background:${d.color}"></span>${d.name}<span class="lscore">${avgs[i].toFixed(1)}</span></div>`).join('');
}

function renderGlobal(){
  const g=globalAvg();
  document.getElementById('gs-val').textContent=g.toFixed(1);
  const lvl=document.getElementById('gs-level');
  if(g>=4){lvl.textContent='Maîtrisé';lvl.className='gs-level gl-green'}
  else if(g>=2.5){lvl.textContent='En progression';lvl.className='gs-level gl-amber'}
  else{lvl.textContent='À structurer';lvl.className='gs-level gl-red'}
}

function renderSynthesis(){
  const avgs=DOMAINS.map((d,i)=>({name:d.name,avg:domainAvg(i)}));
  const sorted=[...avgs].sort((a,b)=>a.avg-b.avg);
  const strengths=sorted.filter(s=>s.avg>=3.5).slice(-3).reverse();
  const weaknesses=sorted.filter(s=>s.avg<3.5).slice(0,3);
  let html='';
  if(strengths.length){
    html+=`<div class="synth-section"><div class="synth-title">Points forts</div>${strengths.map(s=>`<div class="synth-item strong">${s.name} (${s.avg.toFixed(1)})</div>`).join('')}</div>`;
  }
  if(weaknesses.length){
    html+=`<div class="synth-section" style="margin-top:12px"><div class="synth-title">Axes de progrès prioritaires</div>${weaknesses.map(s=>`<div class="synth-item weak">${s.name} (${s.avg.toFixed(1)})</div>`).join('')}</div>`;
  }
  // Identify worst individual criteria
  let allCrit=[];
  DOMAINS.forEach((d,di)=>d.criteria.forEach((c,ci)=>allCrit.push({domain:d.name,criterion:c,score:scores[di][ci]})));
  const worst=allCrit.filter(c=>c.score<=2).sort((a,b)=>a.score-b.score).slice(0,5);
  if(worst.length){
    html+=`<div class="synth-section" style="margin-top:12px"><div class="synth-title">Alertes (score ≤ 2)</div>${worst.map(w=>`<div class="synth-item weak" style="font-size:11px">${w.criterion} <span style="color:var(--red);font-weight:600">(${w.score}/5)</span></div>`).join('')}</div>`;
  }
  document.getElementById('synthesis').innerHTML=html||'<p style="font-size:12px;color:var(--tm)">Ajustez les scores pour voir la synthèse.</p>';
}

function render(){renderDomains();renderRadar();renderGlobal();renderSynthesis()}

function expandAll(){document.querySelectorAll('.domain').forEach(d=>d.classList.add('open'))}

function exportCSV(){
  let csv='Domaine;Critère;Score;Label;Observation\n';
  DOMAINS.forEach((d,di)=>{
    d.criteria.forEach((c,ci)=>{
      const v=scores[di][ci];
      csv+=`"${d.name}";"${c}";${v};"${LABELS[v-1]}";"${(observations[di][ci]||'').replace(/"/g,'""')}"\n`;
    });
  });
  // Add metadata
  csv+='\nMétadonnées\n';
  csv+=`Entreprise;"${document.getElementById('m-company').value}"\n`;
  csv+=`Site;"${document.getElementById('m-site').value}"\n`;
  csv+=`Consultant;"${document.getElementById('m-consultant').value}"\n`;
  csv+=`Date;"${document.getElementById('m-date').value}"\n`;
  csv+=`Score global;${globalAvg().toFixed(2)}\n`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const company=document.getElementById('m-company').value||'diagnostic';
  const date=document.getElementById('m-date').value||new Date().toISOString().split('T')[0];
  a.download=`ASCALIS_diagnostic_${company.replace(/\s+/g,'_')}_${date}.csv`;
  a.click();
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const lines=ev.target.result.split('\n').filter(l=>l.trim()&&!l.startsWith('Domaine')&&!l.startsWith('Métadonnées')&&!l.startsWith('Entreprise')&&!l.startsWith('Site')&&!l.startsWith('Consultant')&&!l.startsWith('Date')&&!l.startsWith('Score global'));
    lines.forEach(line=>{
      const parts=line.split(';').map(s=>s.replace(/^"|"$/g,'').trim());
      if(parts.length>=3){
        const domName=parts[0],critText=parts[1],score=parseInt(parts[2]);
        const obs=parts[4]||'';
        DOMAINS.forEach((d,di)=>{
          if(d.name.toLowerCase()===domName.toLowerCase()){
            d.criteria.forEach((c,ci)=>{
              if(c.toLowerCase()===critText.toLowerCase()){
                if(score>=1&&score<=5)scores[di][ci]=score;
                if(obs)observations[di][ci]=obs;
              }
            });
          }
        });
      }
    });
    render();
    expandAll();
  };
  reader.readAsText(file,'UTF-8');
}

// Init
document.getElementById('m-date').value=new Date().toISOString().split('T')[0];
render();

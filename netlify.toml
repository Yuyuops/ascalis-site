# Netlify configuration — ASCALIS
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command   = "npx pagefind@latest --site . --output-path pagefind --exclude-selectors '.hd,.filters,.meta'"
  publish   = "."

# ---------- Security & performance headers ----------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# HTML — toujours revalidé (pas de cache stale)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Index Pagefind — immutable (hash dans le nom de fichier)
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets statiques (fonts, JS catalogues)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

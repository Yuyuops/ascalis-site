<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abaque des Outils — ASCALIS</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0F1A2E;--primary-light:#1B3A4B;--accent:#B07642;--accent-light:#D4956A;--accent-bg:rgba(176,118,66,.08);--surface:#FFFFFF;--surface-alt:#F8FAFC;--warm:#FAF9F6;--on-surface:#020617;--on-surface-2:#475569;--on-surface-3:#94A3B8;--border:#E2E8F0;--border-light:#F1F5F9;--success:#059669;--success-bg:#ECFDF5;--warning:#D97706;--warning-bg:#FFFBEB;--info:#2563EB;--info-bg:#EFF6FF;--shadow-sm:0 2px 4px rgba(0,0,0,.05);--shadow-md:0 4px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 24px rgba(0,0,0,.06);--radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-full:9999px;--ease:cubic-bezier(.16,1,.3,1);--font-h:'Lexend',sans-serif;--font-b:'Source Sans 3',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--warm);color:var(--on-surface);-webkit-font-smoothing:antialiased}

.hd{background:var(--surface);border-bottom:1px solid var(--border-light);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hd svg{height:22px}
.hd-right{display:flex;gap:12px;align-items:center}
.hd-link{font-family:var(--font-h);font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}

.hero{background:var(--primary);padding:40px 32px 32px;color:var(--surface-alt)}
.hero h1{font-family:var(--font-h);font-size:clamp(22px,3vw,30px);font-weight:500;margin-bottom:8px}
.hero p{font-size:15px;color:rgba(248,250,252,.5);max-width:600px}

.stats-bar{background:var(--surface);border-bottom:1px solid var(--border-light);padding:16px 32px;display:flex;gap:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-family:var(--font-h);font-size:24px;font-weight:600;line-height:1}
.stat-label{font-size:11px;color:var(--on-surface-3);margin-top:2px}

.filters{padding:16px 32px;background:var(--surface);border-bottom:1px solid var(--border-light);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters label{font-family:var(--font-h);font-size:12px;color:var(--on-surface-3);margin-right:4px}
.filter-btn{padding:6px 14px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--surface);font-family:var(--font-h);font-size:12px;color:var(--on-surface-2);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-input{padding:6px 14px;border-radius:var(--radius-full);border:1px solid var(--border);font-family:var(--font-b);font-size:13px;outline:none;min-width:220px;background:var(--surface-alt)}
.search-input:focus{border-color:var(--accent)}

.container{max-width:1200px;margin:0 auto;padding:24px}

.category{margin-bottom:32px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border-light)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-title{font-family:var(--font-h);font-size:16px;font-weight:600}
.cat-count{font-family:var(--font-h);font-size:12px;color:var(--on-surface-3);margin-left:auto}

.tools-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.tools-table thead{position:sticky;top:52px;z-index:10}
.tools-table th{background:var(--surface-alt);padding:8px 12px;text-align:left;font-family:var(--font-h);font-size:11px;font-weight:500;color:var(--on-surface-3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.tools-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.tools-table tr{background:var(--surface);transition:background .1s}
.tools-table tr:hover{background:var(--surface-alt)}
.tools-table tr.built{background:var(--success-bg)}
.tools-table tr.priority{background:var(--warning-bg)}

.tool-name{font-family:var(--font-h);font-weight:500;color:var(--on-surface)}
.tool-name a{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent)}
.tool-name a:hover{border-bottom-style:solid}

.badge{display:inline-block;font-family:var(--font-h);font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap}
.b-built{background:var(--success-bg);color:var(--success)}
.b-priority{background:var(--warning-bg);color:var(--warning)}
.b-planned{background:var(--surface-alt);color:var(--on-surface-3);border:1px solid var(--border)}
.b-new{background:var(--info-bg);color:var(--info)}

.offer-tag{font-family:var(--font-h);font-size:10px;color:var(--accent);background:var(--accent-bg);padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;display:inline-block;margin:1px}
.source-tag{font-size:11px;color:var(--on-surface-3)}

.legend{display:flex;gap:16px;flex-wrap:wrap;padding:16px 0;font-size:12px;color:var(--on-surface-2);border-top:1px solid var(--border-light);margin-top:24px}
.legend-item{display:flex;align-items:center;gap:6px}

@media(max-width:800px){
  .tools-table{font-size:12px}
  .tools-table th:nth-child(4),.tools-table td:nth-child(4),
  .tools-table th:nth-child(5),.tools-table td:nth-child(5){display:none}
  .filters{flex-direction:column;align-items:stretch}
  .stats-bar{gap:16px}
  .container{padding:16px}
}
@media print{
  .hd,.filters,.search-input,.filter-btn{display:none!important}
  .tools-table thead{position:static}
  body{background:white}
}
</style>
</head>

let currentFilter='all';
let searchQuery='';

function render(){
  let totalTools=0,built=0,priority=0,planned=0;
  CATEGORIES.forEach(c=>c.tools.forEach(t=>{
    totalTools++;
    if(t.status==='built')built++;
    else if(t.status==='priority')priority++;
    else planned++;
  }));

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-val" style="color:var(--primary)">${totalTools}</div><div class="stat-label">Outils total</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--success)">${built}</div><div class="stat-label">Digitalisés</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--warning)">${priority}</div><div class="stat-label">Prioritaires</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--on-surface-3)">${planned}</div><div class="stat-label">Planifiés</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent)">${Math.round(built/totalTools*100)}%</div><div class="stat-label">Couverture</div></div>
  `;

  let html='';
  CATEGORIES.forEach(cat=>{
    const filtered=cat.tools.filter(t=>{
      const matchFilter=currentFilter==='all'||t.status===currentFilter;
      const matchSearch=!searchQuery||t.name.toLowerCase().includes(searchQuery)||t.offers.some(o=>('offre '+o).includes(searchQuery));
      return matchFilter&&matchSearch;
    });
    if(!filtered.length)return;

    html+=`<div class="category"><div class="cat-header"><span class="cat-dot" style="background:${cat.color}"></span><span class="cat-title">${cat.name}</span><span class="cat-count">${filtered.length} outil${filtered.length>1?'s':''}</span></div>`;
    html+=`<table class="tools-table"><thead><tr><th style="width:35%">Outil</th><th style="width:15%">Offres liées</th><th style="width:18%">Source</th><th style="width:12%">Statut</th><th>Notes</th></tr></thead><tbody>`;
    filtered.forEach(t=>{
      const statusCls=t.status==='built'?'b-built':t.status==='priority'?'b-priority':'b-planned';
      const statusLabel=t.status==='built'?'Digitalisé':t.status==='priority'?'Prioritaire':'Planifié';
      const rowCls=t.status==='built'?'built':t.status==='priority'?'priority':'';
      const nameHtml=t.link?`<a href="${t.link}">${t.name}</a>`:t.name;
      html+=`<tr class="${rowCls}"><td class="tool-name">${nameHtml}</td><td>${t.offers.map(o=>`<span class="offer-tag">Offre ${o}</span>`).join(' ')}</td><td class="source-tag">${t.source}</td><td><span class="badge ${statusCls}">${statusLabel}</span></td><td style="font-size:12px;color:var(--on-surface-3)">${t.note||''}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });

  html+=`<div class="legend">
    <div class="legend-item"><span class="badge b-built">Digitalisé</span> Outil HTML interactif disponible</div>
    <div class="legend-item"><span class="badge b-priority">Prioritaire</span> Prochains à digitaliser (Pareto, VSM, SIPOC, Ishikawa, SPC)</div>
    <div class="legend-item"><span class="badge b-planned">Planifié</span> Identifié dans les ouvrages, à construire</div>
  </div>`;

  document.getElementById('content').innerHTML=html;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function searchTools(q){
  searchQuery=q.toLowerCase().trim();
  render();
}

render();
</script>
</body>
</html>

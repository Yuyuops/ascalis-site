<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche 8D — ASCALIS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--night:#0F1A2E;--copper:#B07642;--copper-light:#D4956A;--cream:#FAF9F6;--white:#fff;--text:#2C3E50;--tl:#5A6B7A;--tm:#8A95A0;--green:#0F6E56;--amber:#854F0B;--red:#A32D2D;--border:rgba(0,0,0,.06);--f:'DM Sans',sans-serif;--d:'Instrument Serif',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--cream);color:var(--text)}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header svg{height:22px}
.header-actions{display:flex;gap:8px}
.hbtn{padding:7px 16px;border-radius:6px;font-family:var(--f);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--tl);transition:all .2s}
.hbtn:hover{border-color:var(--copper);color:var(--copper)}
.hbtn.primary{background:var(--night);color:var(--cream);border-color:var(--night)}
.hero{background:var(--night);padding:32px 28px;color:var(--cream)}
.hero h1{font-family:var(--d);font-size:28px;font-weight:400;margin-bottom:6px}
.hero p{font-size:14px;color:rgba(232,230,223,.5)}
.container{max-width:900px;margin:0 auto;padding:28px 24px}
.step{background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.step-header{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:all .15s}
.step-header:hover{background:rgba(0,0,0,.01)}
.step.open .step-header{border-bottom-color:var(--border)}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:var(--white)}
.step-info{flex:1}
.step-title{font-size:14px;font-weight:600}
.step-desc{font-size:11px;color:var(--tm);margin-top:2px}
.step-status{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500}
.ss-todo{background:var(--cream);color:var(--tm)}
.ss-wip{background:#FAEEDA;color:var(--amber)}
.ss-done{background:#E1F5EE;color:var(--green)}
.step-toggle{font-size:16px;color:var(--tm);transition:transform .2s}
.step.open .step-toggle{transform:rotate(180deg)}
.step-body{display:none;padding:20px}
.step.open .step-body{display:block}
.field{margin-bottom:16px}
.field label{font-size:12px;font-weight:500;color:var(--tl);display:block;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--f);font-size:13px;outline:none;background:var(--cream);color:var(--text)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--copper)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.add-row{padding:8px 16px;border:1px dashed var(--border);background:none;border-radius:6px;font-family:var(--f);font-size:12px;color:var(--tm);cursor:pointer;width:100%;transition:all .2s;margin-top:8px}
.add-row:hover{border-color:var(--copper);color:var(--copper)}
.why-chain{counter-reset:why}
.why-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;counter-increment:why}
.why-item::before{content:'P' counter(why);font-size:11px;font-weight:700;color:var(--copper);background:rgba(176,118,66,.1);padding:4px 8px;border-radius:4px;margin-top:6px;flex-shrink:0}
.why-item textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:var(--f);font-size:12px;min-height:36px;resize:vertical;outline:none;background:var(--cream)}
.why-item textarea:focus{border-color:var(--copper)}
.ish-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ish-cat{background:var(--cream);border-radius:8px;padding:12px}
.ish-cat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ish-cat textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--f);font-size:11px;min-height:48px;resize:vertical;outline:none;background:var(--white)}
.action-table{width:100%;border-collapse:collapse;font-size:12px}
.action-table th{text-align:left;padding:8px 10px;background:var(--cream);font-weight:500;color:var(--tl);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.action-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.action-table input,.action-table select{border:1px solid transparent;padding:4px 6px;font-family:var(--f);font-size:12px;width:100%;background:transparent;outline:none;border-radius:3px}
.action-table input:focus,.action-table select:focus{border-color:var(--copper);background:var(--cream)}
.action-table .del{color:var(--tm);cursor:pointer;font-size:14px;text-align:center}
.action-table .del:hover{color:var(--red)}
.progress-bar{display:flex;gap:2px;margin-top:20px}
.progress-seg{flex:1;height:6px;border-radius:3px;background:var(--cream);transition:background .3s}
.progress-seg.done{background:var(--green)}
.progress-seg.wip{background:var(--copper)}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--tm);margin-top:6px}
@media print{
  .header,.hbtn{display:none!important}
  .step.open .step-body{display:block!important}
  .step{break-inside:avoid}
  body{background:white}
  .hero{background:none;color:var(--text);padding:16px 0}
  .hero h1{color:var(--night)}
}
@media(max-width:700px){.field-row,.field-row-3,.ish-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 240 40" fill="none"><path d="M4 36 L14 6 L24 36" stroke="#B07642" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="34" y="32" font-family="'DM Sans',sans-serif" font-size="24" font-weight="500" fill="#0F1A2E" letter-spacing="4.5">SCALIS</text></svg>
  <div class="header-actions">
    <button class="hbtn" onclick="exportData()">↓ Export CSV</button>
    <button class="hbtn" onclick="window.print()">🖨 Imprimer</button>
  </div>
</div>

<div class="hero">
  <h1>Fiche 8D — Résolution de problème</h1>
  <p>Méthode structurée en 8 disciplines — de la détection à la clôture</p>
</div>

<div class="container">
  <div class="progress-bar" id="progress-bar"></div>
  <div class="progress-info"><span id="p-count">0/8 étapes complétées</span><span id="p-date"></span></div>
  <div style="height:16px"></div>
  <div id="steps"></div>
</div>

<script>
const STEPS=[
  {d:'D0',title:'Préparation',desc:'Définir l\'équipe et les conditions du 8D',color:'#185FA5',fields:'meta'},
  {d:'D1',title:'Constitution de l\'équipe',desc:'Identifier les membres et leurs rôles',color:'#0F6E56',fields:'team'},
  {d:'D2',title:'Description du problème',desc:'QQOQCCP — décrire factuellement le problème',color:'#D4956A',fields:'problem'},
  {d:'D3',title:'Actions immédiates',desc:'Contenir le problème — protéger le client',color:'#A32D2D',fields:'containment'},
  {d:'D4',title:'Analyse des causes racines',desc:'5 Pourquoi + Ishikawa — identifier la vraie cause',color:'#534AB7',fields:'rootcause'},
  {d:'D5',title:'Actions correctives permanentes',desc:'Éliminer définitivement la cause racine',color:'#185FA5',fields:'corrective'},
  {d:'D6',title:'Vérification d\'efficacité',desc:'Confirmer que les actions sont efficaces',color:'#0F6E56',fields:'verification'},
  {d:'D7',title:'Prévention de la récurrence',desc:'Capitaliser et standardiser',color:'#854F0B',fields:'prevention'}
];

let data={
  meta:{ref:'',client:'',product:'',date_detect:'',severity:'Majeure'},
  team:[{name:'',role:'Pilote'},{name:'',role:'Membre'}],
  problem:{what:'',who:'',where:'',when:'',how:'',how_much:'',why_urgent:''},
  containment:[{action:'',responsible:'',deadline:'',status:'En cours'}],
  whys:['','','','',''],
  ishikawa:{milieu:'',matiere:'',methode:'',machine:'',main_oeuvre:'',mesure:''},
  corrective:[{action:'',responsible:'',deadline:'',status:'Planifié'}],
  verification:{criteria:'',method:'',result:'',effective:''},
  prevention:{standard:'',formation:'',transversal:'',lesson:''},
  statuses:[0,0,0,0,0,0,0,0]
};

function getStatusClass(s){return s===2?'ss-done':s===1?'ss-wip':'ss-todo'}
function getStatusText(s){return s===2?'Terminé':s===1?'En cours':'À faire'}
function cycleStatus(i){data.statuses[i]=(data.statuses[i]+1)%3;renderAll()}

function renderAll(){
  let html='';
  STEPS.forEach((step,i)=>{
    const st=data.statuses[i];
    html+=`<div class="step${i===0?' open':''}" data-i="${i}">
      <div class="step-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="step-num" style="background:${step.color}">${step.d}</div>
        <div class="step-info"><div class="step-title">${step.title}</div><div class="step-desc">${step.desc}</div></div>
        <span class="step-status ${getStatusClass(st)}" onclick="event.stopPropagation();cycleStatus(${i})">${getStatusText(st)}</span>
        <span class="step-toggle">▾</span>
      </div>
      <div class="step-body">${renderStepBody(step,i)}</div>
    </div>`;
  });
  document.getElementById('steps').innerHTML=html;
  
  const done=data.statuses.filter(s=>s===2).length;
  document.getElementById('progress-bar').innerHTML=STEPS.map((_,i)=>`<div class="progress-seg ${data.statuses[i]===2?'done':data.statuses[i]===1?'wip':''}"></div>`).join('');
  document.getElementById('p-count').textContent=`${done}/8 étapes complétées`;
}

function renderStepBody(step,i){
  switch(step.fields){
    case 'meta': return `
      <div class="field-row"><div class="field"><label>Référence 8D</label><input value="${data.meta.ref}" oninput="data.meta.ref=this.value" placeholder="8D-2026-001"></div><div class="field"><label>Date de détection</label><input type="date" value="${data.meta.date_detect}" oninput="data.meta.date_detect=this.value"></div></div>
      <div class="field-row"><div class="field"><label>Client concerné</label><input value="${data.meta.client}" oninput="data.meta.client=this.value" placeholder="Nom du client"></div><div class="field"><label>Produit / Référence</label><input value="${data.meta.product}" oninput="data.meta.product=this.value" placeholder="Réf. produit"></div></div>
      <div class="field"><label>Sévérité</label><select onchange="data.meta.severity=this.value"><option ${data.meta.severity==='Critique'?'selected':''}>Critique</option><option ${data.meta.severity==='Majeure'?'selected':''}>Majeure</option><option ${data.meta.severity==='Mineure'?'selected':''}>Mineure</option></select></div>`;
    case 'team': return `
      <table class="action-table"><thead><tr><th>Nom</th><th>Rôle</th><th style="width:30px"></th></tr></thead><tbody>
      ${data.team.map((t,ti)=>`<tr><td><input value="${t.name}" oninput="data.team[${ti}].name=this.value" placeholder="Nom"></td><td><select onchange="data.team[${ti}].role=this.value"><option ${t.role==='Pilote'?'selected':''}>Pilote</option><option ${t.role==='Membre'?'selected':''}>Membre</option><option ${t.role==='Expert'?'selected':''}>Expert</option><option ${t.role==='Sponsor'?'selected':''}>Sponsor</option></select></td><td class="del" onclick="data.team.splice(${ti},1);renderAll()">×</td></tr>`).join('')}
      </tbody></table>
      <button class="add-row" onclick="data.team.push({name:'',role:'Membre'});renderAll()">+ Ajouter un membre</button>`;
    case 'problem': return `
      <div class="field"><label>Quoi ? (What) — Description du problème</label><textarea oninput="data.problem.what=this.value" placeholder="Quel est le problème constaté ?">${data.problem.what}</textarea></div>
      <div class="field-row"><div class="field"><label>Qui ? (Who)</label><input value="${data.problem.who}" oninput="data.problem.who=this.value" placeholder="Qui a détecté / est impacté ?"></div><div class="field"><label>Où ? (Where)</label><input value="${data.problem.where}" oninput="data.problem.where=this.value" placeholder="Lieu / poste / machine"></div></div>
      <div class="field-row"><div class="field"><label>Quand ? (When)</label><input value="${data.problem.when}" oninput="data.problem.when=this.value" placeholder="Date, fréquence"></div><div class="field"><label>Comment ? (How)</label><input value="${data.problem.how}" oninput="data.problem.how=this.value" placeholder="Comment le problème se manifeste"></div></div>
      <div class="field-row"><div class="field"><label>Combien ? (How much)</label><input value="${data.problem.how_much}" oninput="data.problem.how_much=this.value" placeholder="Quantité, coût, impact"></div><div class="field"><label>Pourquoi urgent ?</label><input value="${data.problem.why_urgent}" oninput="data.problem.why_urgent=this.value" placeholder="Impact client, risque"></div></div>`;
    case 'containment': return `
      <p style="font-size:12px;color:var(--tm);margin-bottom:12px">Actions de protection immédiate du client (tri, contrôle renforcé, blocage lot...)</p>
      <table class="action-table"><thead><tr><th>Action</th><th>Responsable</th><th>Échéance</th><th>Statut</th><th style="width:30px"></th></tr></thead><tbody>
      ${data.containment.map((a,ai)=>`<tr><td><input value="${a.action}" oninput="data.containment[${ai}].action=this.value" placeholder="Action de containment"></td><td><input value="${a.responsible}" oninput="data.containment[${ai}].responsible=this.value" placeholder="Qui"></td><td><input type="date" value="${a.deadline}" oninput="data.containment[${ai}].deadline=this.value"></td><td><select onchange="data.containment[${ai}].status=this.value"><option ${a.status==='Planifié'?'selected':''}>Planifié</option><option ${a.status==='En cours'?'selected':''}>En cours</option><option ${a.status==='Réalisé'?'selected':''}>Réalisé</option></select></td><td class="del" onclick="data.containment.splice(${ai},1);renderAll()">×</td></tr>`).join('')}
      </tbody></table>
      <button class="add-row" onclick="data.containment.push({action:'',responsible:'',deadline:'',status:'Planifié'});renderAll()">+ Ajouter une action</button>`;
    case 'rootcause': return `
      <p style="font-size:13px;font-weight:600;margin-bottom:12px">Méthode des 5 Pourquoi</p>
      <div class="why-chain">${data.whys.map((w,wi)=>`<div class="why-item"><textarea oninput="data.whys[${wi}]=this.value" placeholder="Pourquoi ?">${w}</textarea></div>`).join('')}</div>
      <p style="font-size:13px;font-weight:600;margin:20px 0 12px">Diagramme d'Ishikawa (5M + Mesure)</p>
      <div class="ish-grid">
        <div class="ish-cat"><div class="ish-cat-title" style="color:var(--blue)">Milieu</div><textarea oninput="data.ishikawa.milieu=this.value" placeholder="Environnement, conditions...">${data.ishikawa.milieu}</textarea></div>
        <div class="ish-cat"><div class="ish-cat-title" style="color:var(--amber)">Matière</div><textarea oninput="data.ishikawa.matiere=this.value" placeholder="Matière première, composants...">${data.ishikawa.matiere}</textarea></div>
        <div class="ish-cat"><div class="ish-cat-title" style="color:var(--green)">Méthode</div><textarea oninput="data.ishikawa.methode=this.value" placeholder="Process, gamme, procédure...">${data.ishikawa.methode}</textarea></div>
        <div class="ish-cat"><div class="ish-cat-title" style="color:var(--red)">Machine</div><textarea oninput="data.ishikawa.machine=this.value" placeholder="Équipement, outillage...">${data.ishikawa.machine}</textarea></div>
        <div class="ish-cat"><div class="ish-cat-title" style="color:#534AB7">Main d'œuvre</div><textarea oninput="data.ishikawa.main_oeuvre=this.value" placeholder="Compétence, formation...">${data.ishikawa.main_oeuvre}</textarea></div>
        <div class="ish-cat"><div class="ish-cat-title" style="color:var(--copper)">Mesure</div><textarea oninput="data.ishikawa.mesure=this.value" placeholder="Métrologie, indicateurs...">${data.ishikawa.mesure}</textarea></div>
      </div>`;
    case 'corrective': return `
      <p style="font-size:12px;color:var(--tm);margin-bottom:12px">Actions pour éliminer définitivement la cause racine identifiée en D4</p>
      <table class="action-table"><thead><tr><th>Action corrective</th><th>Responsable</th><th>Échéance</th><th>Statut</th><th style="width:30px"></th></tr></thead><tbody>
      ${data.corrective.map((a,ai)=>`<tr><td><input value="${a.action}" oninput="data.corrective[${ai}].action=this.value" placeholder="Action corrective permanente"></td><td><input value="${a.responsible}" oninput="data.corrective[${ai}].responsible=this.value" placeholder="Qui"></td><td><input type="date" value="${a.deadline}" oninput="data.corrective[${ai}].deadline=this.value"></td><td><select onchange="data.corrective[${ai}].status=this.value"><option ${a.status==='Planifié'?'selected':''}>Planifié</option><option ${a.status==='En cours'?'selected':''}>En cours</option><option ${a.status==='Réalisé'?'selected':''}>Réalisé</option><option ${a.status==='Vérifié'?'selected':''}>Vérifié</option></select></td><td class="del" onclick="data.corrective.splice(${ai},1);renderAll()">×</td></tr>`).join('')}
      </tbody></table>
      <button class="add-row" onclick="data.corrective.push({action:'',responsible:'',deadline:'',status:'Planifié'});renderAll()">+ Ajouter une action</button>`;
    case 'verification': return `
      <div class="field"><label>Critères de vérification d'efficacité</label><textarea oninput="data.verification.criteria=this.value" placeholder="Comment saurez-vous que le problème est résolu ?">${data.verification.criteria}</textarea></div>
      <div class="field-row"><div class="field"><label>Méthode de vérification</label><input value="${data.verification.method}" oninput="data.verification.method=this.value" placeholder="Contrôle, audit, mesure..."></div><div class="field"><label>Résultat</label><input value="${data.verification.result}" oninput="data.verification.result=this.value" placeholder="Résultat constaté"></div></div>
      <div class="field"><label>Efficacité confirmée ?</label><select onchange="data.verification.effective=this.value"><option value="">À vérifier</option><option ${data.verification.effective==='Oui'?'selected':''}>Oui — problème résolu</option><option ${data.verification.effective==='Non'?'selected':''}>Non — retour en D4</option><option ${data.verification.effective==='Partiel'?'selected':''}>Partiel — action complémentaire requise</option></select></div>`;
    case 'prevention': return `
      <div class="field"><label>Mise à jour des standards (gammes, procédures, instructions)</label><textarea oninput="data.prevention.standard=this.value" placeholder="Quels documents ont été mis à jour ?">${data.prevention.standard}</textarea></div>
      <div class="field"><label>Formation / sensibilisation des équipes</label><textarea oninput="data.prevention.formation=this.value" placeholder="Qui a été formé ? Sur quoi ?">${data.prevention.formation}</textarea></div>
      <div class="field"><label>Transversalisation (autres lignes, produits, sites)</label><textarea oninput="data.prevention.transversal=this.value" placeholder="Le problème peut-il se reproduire ailleurs ?">${data.prevention.transversal}</textarea></div>
      <div class="field"><label>Leçon apprise (capitalisation)</label><textarea oninput="data.prevention.lesson=this.value" placeholder="Que retient-on pour l'avenir ?">${data.prevention.lesson}</textarea></div>`;
  }
}

function exportData(){
  let csv='Section;Champ;Valeur\n';
  csv+=`D0;Référence;"${data.meta.ref}"\nD0;Client;"${data.meta.client}"\nD0;Produit;"${data.meta.product}"\nD0;Date détection;"${data.meta.date_detect}"\nD0;Sévérité;"${data.meta.severity}"\n`;
  data.team.forEach((t,i)=>csv+=`D1;Membre ${i+1};"${t.name} (${t.role})"\n`);
  ['what','who','where','when','how','how_much','why_urgent'].forEach(k=>csv+=`D2;${k};"${data.problem[k]}"\n`);
  data.containment.forEach((a,i)=>csv+=`D3;Action ${i+1};"${a.action} | ${a.responsible} | ${a.deadline} | ${a.status}"\n`);
  data.whys.forEach((w,i)=>csv+=`D4;Pourquoi ${i+1};"${w}"\n`);
  Object.entries(data.ishikawa).forEach(([k,v])=>csv+=`D4;Ishikawa ${k};"${v}"\n`);
  data.corrective.forEach((a,i)=>csv+=`D5;Action ${i+1};"${a.action} | ${a.responsible} | ${a.deadline} | ${a.status}"\n`);
  Object.entries(data.verification).forEach(([k,v])=>csv+=`D6;${k};"${v}"\n`);
  Object.entries(data.prevention).forEach(([k,v])=>csv+=`D7;${k};"${v}"\n`);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ASCALIS_8D_${data.meta.ref||'nouveau'}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

renderAll();
</script>
</body>
</html>

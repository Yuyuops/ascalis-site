<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ASCALIS — Redirection…</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root{--primary:#0F1A2E;--accent:#B07642;--surface:#FAF9F6;--text:#475569;--border:#E2E8F0}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--surface);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
    .box{max-width:720px;width:100%;background:#fff;border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 12px 32px rgba(15,26,46,.06)}
    h1{margin:0 0 12px;color:var(--primary);font-size:28px}p{margin:0;line-height:1.7}
  </style>
</head>
<body>
  <div class="box">
    <h1>Redirection ASCALIS</h1>
    <p>Nous vous redirigeons vers la bonne route. Si rien ne se passe, revenez à l’accueil.</p>
  </div>
  <script>
    (async function () {
      const path = window.location.pathname;
      const isGithubProjectSite = window.location.hostname.endsWith('github.io') && path.startsWith('/ascalis-site/');
      const repoBase = isGithubProjectSite ? '/ascalis-site' : '';
      const normalizedPath = repoBase && path.startsWith(repoBase) ? path.slice(repoBase.length) || '/' : path;

      try {
        const response = await fetch(`${repoBase}/legacy-redirects.json`, { cache: 'no-store' });
        const redirects = response.ok ? await response.json() : {};
        const cleanPath = normalizedPath.replace(/\/$/, '') || '/';
        const target = redirects[normalizedPath] || redirects[cleanPath] || '/';
        const suffix = `${window.location.search || ''}${window.location.hash || ''}`;
        window.location.replace(`${repoBase}${target}${suffix}`);
      } catch (error) {
        window.location.replace(`${repoBase}/`);
      }
    })();
  </script>
</body>
</html>

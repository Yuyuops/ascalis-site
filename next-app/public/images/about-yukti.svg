<svg viewBox="0 0 560 680" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B3A4B"/>
      <stop offset="100%" stop-color="#080F18"/>
    </linearGradient>
    <radialGradient id="glow" cx="280" cy="290" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B07642" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B07642" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4956A"/>
      <stop offset="100%" stop-color="#8A5B30"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="280" cy="272" r="148"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="560" height="680" fill="url(#bg)"/>
  <rect width="560" height="680" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#B07642" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="90" x2="560" y2="90"/>
    <line x1="0" y1="180" x2="560" y2="180"/>
    <line x1="0" y1="270" x2="560" y2="270"/>
    <line x1="0" y1="360" x2="560" y2="360"/>
    <line x1="0" y1="450" x2="560" y2="450"/>
    <line x1="0" y1="540" x2="560" y2="540"/>
    <line x1="0" y1="630" x2="560" y2="630"/>
    <line x1="90" y1="0" x2="90" y2="680"/>
    <line x1="180" y1="0" x2="180" y2="680"/>
    <line x1="270" y1="0" x2="270" y2="680"/>
    <line x1="360" y1="0" x2="360" y2="680"/>
    <line x1="470" y1="0" x2="470" y2="680"/>
  </g>

  <!-- Portrait ring outer -->
  <circle cx="280" cy="272" r="158" stroke="#B07642" stroke-width="1" opacity="0.25"/>
  <!-- Portrait ring inner -->
  <circle cx="280" cy="272" r="148" fill="#0F1A2E"/>

  <!-- Monogram YR -->
  <text x="280" y="310" font-family="'Lexend', 'Helvetica Neue', sans-serif"
        font-size="108" font-weight="300" fill="#B07642" text-anchor="middle"
        letter-spacing="-4" opacity="0.9">YR</text>

  <!-- Decorative arc top -->
  <path d="M 148 200 A 148 148 0 0 1 412 200" stroke="url(#copper)" stroke-width="3"
        stroke-linecap="round" opacity="0.6" fill="none"/>

  <!-- Copper dot accents on arc -->
  <circle cx="148" cy="200" r="5" fill="#B07642" opacity="0.7"/>
  <circle cx="412" cy="200" r="5" fill="#B07642" opacity="0.7"/>
  <circle cx="280" cy="124" r="5" fill="#D4956A"/>

  <!-- ASCALIS A logo above -->
  <g transform="translate(254, 88)">
    <path d="M26 4 L52 48 L0 48 Z" stroke="#B07642" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="10" y1="36" x2="42" y2="36" stroke="#B07642" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Separator line -->
  <line x1="100" y1="458" x2="460" y2="458" stroke="#B07642" stroke-width="1" opacity="0.2"/>

  <!-- Name -->
  <text x="280" y="498" font-family="'Lexend', 'Helvetica Neue', sans-serif"
        font-size="28" font-weight="500" fill="#F8FAFC" text-anchor="middle"
        letter-spacing="4">YUKTI RANJAN</text>

  <!-- Title -->
  <text x="280" y="528" font-family="'Lexend', 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="400" fill="#B07642" text-anchor="middle"
        letter-spacing="3.5">CONSULTANT QUALITÉ &amp; PERFORMANCE</text>

  <!-- Tags row -->
  <g transform="translate(280, 570)" text-anchor="middle"
     font-family="'Lexend', 'Helvetica Neue', sans-serif" font-size="9.5"
     font-weight="400" letter-spacing="1.5" fill="#94A3B8">
    <text>AÉRONAUTIQUE · BTP · TRANSPORT &amp; LOGISTIQUE</text>
  </g>

  <!-- Bottom KPI bars -->
  <g transform="translate(104, 610)" opacity="0.55">
    <!-- Bar 1 -->
    <rect x="0" y="0" width="70" height="3" rx="2" fill="#1B3A4B"/>
    <rect x="0" y="0" width="56" height="3" rx="2" fill="#B07642"/>
    <text x="0" y="-6" font-family="'Lexend', sans-serif" font-size="8"
          fill="#64748B" letter-spacing="1">8+ ANS</text>
    <!-- Bar 2 -->
    <rect x="90" y="0" width="70" height="3" rx="2" fill="#1B3A4B"/>
    <rect x="90" y="0" width="70" height="3" rx="2" fill="#B07642"/>
    <text x="90" y="-6" font-family="'Lexend', sans-serif" font-size="8"
          fill="#64748B" letter-spacing="1">100% TERRAIN</text>
    <!-- Bar 3 -->
    <rect x="200" y="0" width="70" height="3" rx="2" fill="#1B3A4B"/>
    <rect x="200" y="0" width="46" height="3" rx="2" fill="#D4956A"/>
    <text x="200" y="-6" font-family="'Lexend', sans-serif" font-size="8"
          fill="#64748B" letter-spacing="1">BLACK BELT</text>
    <!-- Bar 4 -->
    <rect x="300" y="0" width="56" height="3" rx="2" fill="#1B3A4B"/>
    <rect x="300" y="0" width="56" height="3" rx="2" fill="#B07642"/>
    <text x="300" y="-6" font-family="'Lexend', sans-serif" font-size="8"
          fill="#64748B" letter-spacing="1">ISO 9001</text>
  </g>

  <!-- Gear ornament top right -->
  <g transform="translate(478, 48)" opacity="0.15" stroke="#B07642" stroke-width="1.5">
    <circle cx="22" cy="22" r="14" fill="none"/>
    <circle cx="22" cy="22" r="6" fill="none"/>
    <rect x="20" y="4" width="4" height="7" rx="1.5" fill="#B07642"/>
    <rect x="20" y="33" width="4" height="7" rx="1.5" fill="#B07642"/>
    <rect x="4" y="20" width="7" height="4" rx="1.5" fill="#B07642"/>
    <rect x="33" y="20" width="7" height="4" rx="1.5" fill="#B07642"/>
    <rect x="8.5" y="8.5" width="4" height="4" rx="1" fill="#B07642" transform="rotate(45 10.5 10.5)"/>
    <rect x="31.5" y="31.5" width="4" height="4" rx="1" fill="#B07642" transform="rotate(45 33.5 33.5)"/>
    <rect x="8.5" y="31.5" width="4" height="4" rx="1" fill="#B07642" transform="rotate(45 10.5 33.5)"/>
    <rect x="31.5" y="8.5" width="4" height="4" rx="1" fill="#B07642" transform="rotate(45 33.5 10.5)"/>
  </g>

  <!-- Gear ornament bottom left -->
  <g transform="translate(30, 590)" opacity="0.12" stroke="#B07642" stroke-width="1.5">
    <circle cx="22" cy="22" r="14" fill="none"/>
    <circle cx="22" cy="22" r="6" fill="none"/>
    <rect x="20" y="4" width="4" height="7" rx="1.5" fill="#B07642"/>
    <rect x="20" y="33" width="4" height="7" rx="1.5" fill="#B07642"/>
    <rect x="4" y="20" width="7" height="4" rx="1.5" fill="#B07642"/>
    <rect x="33" y="20" width="7" height="4" rx="1.5" fill="#B07642"/>
  </g>
</svg>
